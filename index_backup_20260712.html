<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Wolverpelagén</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Barlow+Condensed:ital,wght@0,400;0,600&family=Barlow:wght@300;400&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #f1efe8;
    --text: #2c2c2a;
    --text-dim: #888780;
    --amber: #b87d2a;
    --amber-light: #d4962e;
    --border: #d3d1c7;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-weight: 300;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
  }

  main {
    text-align: center;
    opacity: 0;
    transform: translateY(8px);
    animation: rise 0.7s ease-out 0.1s forwards;
  }

  @media (prefers-reduced-motion: reduce) {
    main { animation: none; opacity: 1; transform: none; }
  }

  @keyframes rise {
    to { opacity: 1; transform: translateY(0); }
  }

  .mark {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 52px;
    color: var(--amber);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-bottom: 18px;
  }

  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(40px, 8vw, 64px);
    letter-spacing: -0.01em;
    line-height: 1;
    margin-bottom: 12px;
  }

  p.tag {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 400;
    font-size: 13px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 44px;
  }

  a.cta {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fff;
    background: var(--amber);
    text-decoration: none;
    padding: 16px 34px;
    border-radius: 2px;
    border: 1px solid var(--amber);
    transition: background 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
  }

  a.cta:hover {
    background: var(--amber-light);
    border-color: var(--amber-light);
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(184, 125, 42, 0.25);
  }

  a.cta:active {
    transform: translateY(0);
  }

  a.cta:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 3px;
  }

  a.cta svg {
    width: 14px;
    height: 14px;
    transition: transform 0.18s ease;
  }

  a.cta:hover svg {
    transform: translateX(2px);
  }

  footer {
    margin-top: 56px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--text-dim);
  }
</style>
</head>
<body>
  <main>
    <div class="mark">W</div>
    <h1>Wolverpelagén</h1>
    <p class="tag">Marine Physical Technology</p>
    <a class="cta" href="https://den.wolverpelagen.com">
      Enter The Den
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    </a>
    <footer>© 2026 Wolverpelagén</footer>
  </main>
</body>
</html>
